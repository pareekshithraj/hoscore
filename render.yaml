services:
  - type: web
    name: hoscore-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema=prisma/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=prisma/schema.prisma && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://hoscore.in
      - key: PUBLIC_APP_URL
        value: https://hoscore.in
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # MSG91 — SMS OTP, Email OTP, widget verification
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: MSG91_EMAIL_DOMAIN
        value: hoscore.in
      - key: MSG91_FROM_EMAIL
        value: noreply@hoscore.in
      - key: MSG91_FROM_NAME
        value: HOSCORE
      # Resend — transactional emails
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: HOSCORE <noreply@hoscore.in>
      # Cloudflare R2 — file storage
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
